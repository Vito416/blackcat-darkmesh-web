appId: com.blackcat.desktop
productName: Blackcat Desktop
asar: true
compression: maximum
npmRebuild: false

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - package.json
  - node_modules/**/*
  - "!**/tests/**"
  - "!**/test-results/**"

extraMetadata:
  main: dist/desktop/src/main.js

publish:
  - provider: github
    owner: blackcat-labs
    repo: blackcat-mesh-nexus
    releaseType: draft

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  identity: null
  artifactName: "${name}-${version}-mac-${arch}.${ext}"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  artifactName: "${name}-${version}-win-${arch}.${ext}"
  publisherName:
    - Blackcat Labs
  verifyUpdateCodeSignature: false

nsis:
  artifactName: "${name}-${version}-win-${arch}-setup.${ext}"
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  differentialPackage: true

portable:
  artifactName: "${name}-${version}-win-${arch}-portable.${ext}"

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Utility
  artifactName: "${name}-${version}-linux-${arch}.${ext}"
  maintainer: "Blackcat Labs <ops@blackcat.labs>"

afterSign: scripts/notarize.js
