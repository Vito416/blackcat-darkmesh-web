appId: com.blackcat.desktop
productName: Blackcat Desktop
asar: true
compression: maximum

directories:
  output: release

files:
  - dist/**/*
  - package.json
  - node_modules/**/*

extraMetadata:
  main: dist/desktop/src/main.js

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  identity: null
  artifactName: "${name}-${version}-mac-${arch}.${ext}"

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  artifactName: "${name}-${version}-win-${arch}.${ext}"

nsis:
  artifactName: "${name}-${version}-win-${arch}-setup.${ext}"

portable:
  artifactName: "${name}-${version}-win-${arch}-portable.${ext}"

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Utility
  artifactName: "${name}-${version}-linux-${arch}.${ext}"

publish: never
